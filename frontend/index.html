<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nutrition Finder — Berlin Mitte</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #F4F4F4;
      --surface-2: #fafafa;
      --border: rgba(0,0,0,0.08);
      --border-med: rgba(0,0,0,0.13);
      --text: #1d1d1f;
      --text-2: #3d3d3f;
      --muted: #6e6e73;
      --accent: #1c7c4e;
      --accent-light: #eefaf4;
      --accent-mid: #b3e6cc;
      --radius: 16px;
      --radius-sm: 12px;
      --radius-xs: 9px;
      --shadow: 0 2px 10px rgba(0,0,0,.06), 0 0 0 0.5px rgba(0,0,0,.05);
      --shadow-sm: 0 1px 4px rgba(0,0,0,.05);
      --header-h: 58px;
    }

    html, body {
      height: 100%; overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: rgba(255,255,255,.88);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid rgba(0,0,0,.1);
      padding: 0 24px; position: sticky; top: 0; z-index: 1000;
      height: var(--header-h); display: flex; align-items: center; gap: 14px;
    }
    .header-brand { display: flex; align-items: center; gap: 9px; }
    .header-brand-mark {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .header-brand-mark svg { color: #fff; }
    .header-brand-name { font-size: .95rem; font-weight: 600; letter-spacing: -.025em; color: var(--text); white-space: nowrap; }
    #loc-status { font-size: .72rem; color: var(--muted); }
    .search-wrap { margin-left: auto; position: relative; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--muted); }
    #search-input {
      font-size: .8rem; padding: 7px 12px 7px 32px;
      border: 1px solid var(--border); border-radius: 20px;
      background: rgba(0,0,0,.04); color: var(--text); outline: none;
      width: 200px; transition: border-color .2s, width .2s, box-shadow .2s;
    }
    #search-input::placeholder { color: var(--muted); }
    #search-input:focus { border-color: var(--accent); width: 240px; background: var(--surface); box-shadow: 0 0 0 3px rgba(28,124,78,.1); }
    @media (max-width: 680px) { #search-input { width: 140px; } #search-input:focus { width: 160px; } }

    /* ── Layout ── */
    .layout { display: flex; height: calc(100vh - var(--header-h)); }
    #map-panel { width: 44%; flex-shrink: 0; position: sticky; top: var(--header-h); height: calc(100vh - var(--header-h)); padding: 24px 24px 24px 0; box-sizing: border-box; }
    #map { width: 100%; height: 100%; border-radius: 14px; overflow: hidden; }
    #list-panel { flex: 1; overflow-y: auto; padding: 0 18px 60px; }

    /* ── Mobile: bottom-sheet layout ── */
    @media (max-width: 680px) {
      html, body { height: 100%; overflow: hidden; }

      /* Header fixed at top — reliable on all iOS/Android browsers */
      header {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 1000;
      }

      /* Layout fills full screen below the header */
      .layout {
        position: fixed;
        top: var(--header-h); left: 0; right: 0; bottom: 0;
        overflow: hidden;
      }

      /* Map fills the entire layout area, no padding/radius */
      #map-panel {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        padding: 0;
        z-index: 1;
      }
      #map { width: 100%; height: 100%; border-radius: 0; }

      /* Bottom sheet */
      #list-panel {
        position: absolute; left: 0; right: 0; bottom: 0;
        height: 100%; z-index: 10;
        background: #fff;
        border-radius: 20px 20px 0 0;
        box-shadow: 0 -4px 28px rgba(0,0,0,.15);
        transform: translateY(calc(100% - 110px));
        transition: transform .38s cubic-bezier(.25,.46,.45,.94);
        overflow: hidden;
        display: flex; flex-direction: column;
        padding: 0;
      }
      #list-panel.sheet-expanded {
        transform: translateY(0);
        border-radius: 0;
      }
      #list-panel.sheet-no-transition {
        transition: none !important;
      }

      #sheet-handle {
        flex-shrink: 0;
        display: flex; flex-direction: column; align-items: center;
        padding: 10px 16px 8px; gap: 6px;
        cursor: grab; touch-action: none; user-select: none;
        background: #fff; border-radius: 20px 20px 0 0;
        border-bottom: 0.5px solid rgba(0,0,0,.06);
      }
      .sheet-pill {
        width: 38px; height: 4px; border-radius: 2px;
        background: rgba(0,0,0,.16);
      }
      #sheet-peek-label {
        font-size: .8rem; font-weight: 600; color: var(--text);
        letter-spacing: -.01em;
        transition: opacity .18s;
      }
      #list-panel.sheet-expanded #sheet-peek-label {
        opacity: 0; pointer-events: none;
      }

      #sheet-scroll {
        flex: 1; overflow-y: hidden; overflow-x: hidden;
        padding: 0 14px 80px;
        -webkit-overflow-scrolling: touch;
      }

      .results-header {
        margin: 0 -14px; padding-left: 14px; padding-right: 14px;
        background: #fff; flex-wrap: wrap; gap: 6px;
      }
      .results-header #status-bar { flex-basis: 100%; }
      .results-header-row2 {
        margin: 0 -14px; padding-left: 14px; padding-right: 14px;
        background: #fff;
      }
    }

    /* Floating Map button — mobile only, shown when sheet is expanded */
    #map-float-btn { display: none; }
    @media (max-width: 680px) {
      #map-float-btn {
        display: flex; align-items: center; gap: 7px;
        position: fixed; bottom: 30px; left: 50%;
        transform: translateX(-50%);
        z-index: 30;
        background: #1d1d1f; color: #fff;
        border: none; border-radius: 26px;
        padding: 13px 26px; font-size: .87rem; font-weight: 600;
        cursor: pointer; letter-spacing: -.01em;
        box-shadow: 0 6px 24px rgba(0,0,0,.4);
        opacity: 0; pointer-events: none;
        transition: opacity .22s;
        white-space: nowrap;
      }
      #map-float-btn.visible {
        opacity: 1; pointer-events: auto;
      }
    }

    /* Map controls — desktop: top-right, 16px inside map border */
    #map-controls {
      position: absolute;
      right: 32px; top: 28px;   /* panel padding: 16px right + 16px inside; 12px top + 16px inside */
      display: flex; flex-direction: column; gap: 6px;
      z-index: 5;
    }
    .map-ctrl-btn {
      width: 36px; height: 36px;
      background: #fff;
      border: none; border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
      font-size: 1.3rem; font-weight: 400; line-height: 1;
      color: #1d1d1f;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .map-ctrl-btn:active { background: #f0f0f0; }
    .map-ctrl-locate { margin-top: 4px; }
    @media (max-width: 680px) {
      #map-controls { right: 10px; top: auto; bottom: 130px; }
    }

    /* Desktop: Airbnb-style — list left, framed map right */
    @media (min-width: 681px) {
      #map-panel {
        order: 2;
        width: 46%;
        padding: 12px 16px 12px 8px;
        background: var(--bg);
      }
      #map {
        border-radius: 14px;
        overflow: hidden;
      }
      #list-panel {
        order: 1;
        flex: 1;
        display: flex; flex-direction: column;
        overflow: hidden;
        padding: 0;
      }
      #sheet-handle { display: none; }
      #sheet-scroll { flex: 1; overflow-y: auto; padding: 0 24px 60px; }
    }

    /* ── Profile section ── */
    .profile-section { padding-top: 16px; margin-bottom: 10px; }
    .profile-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }

    .toggle-group { display: flex; background: rgba(0,0,0,.06); border-radius: 10px; padding: 2px; gap: 2px; }
    .toggle-btn {
      font-size: .74rem; font-weight: 500; padding: 5px 13px; border-radius: 8px;
      border: none; background: transparent; color: var(--muted);
      cursor: pointer; transition: all .17s; white-space: nowrap; letter-spacing: -.01em;
    }
    .toggle-btn.active {
      background: var(--surface); color: var(--text); font-weight: 600;
      box-shadow: 0 1px 3px rgba(0,0,0,.11), 0 0 0 0.5px rgba(0,0,0,.05);
    }
    .daily-summary {
      font-size: .71rem; color: var(--muted); padding: 5px 10px;
      background: var(--surface); border-radius: 9px;
      border: 1px solid var(--border); white-space: nowrap;
    }
    .daily-summary b { color: var(--text); font-weight: 600; }

    .meal-tabs-row { display: flex; gap: 5px; margin-bottom: 6px; }
    .meal-tab {
      flex: 1; font-size: .77rem; font-weight: 500; padding: 8px 6px;
      border-radius: var(--radius-xs); border: none;
      background: var(--surface); color: var(--muted);
      cursor: pointer; transition: all .15s; text-align: center;
    }
    .meal-tab:hover { color: var(--text); }
    .meal-tab.active { color: var(--accent); background: var(--accent-light); font-weight: 600; }

    .meal-cfg-row { display: flex; gap: 5px; margin-bottom: 12px; }
    .meal-cfg-btn {
      flex: 1; font-size: .72rem; font-weight: 500; padding: 7px 4px;
      border-radius: var(--radius-xs); border: none;
      background: var(--surface); color: var(--muted);
      cursor: pointer; transition: all .15s; text-align: center;
    }
    .meal-cfg-btn:hover { color: var(--text); }
    .meal-cfg-btn.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }

    /* ── Configurator ── */
    #configurator {
      background: var(--surface);
      border-radius: var(--radius); padding: 14px 16px;
      margin-bottom: 12px;
    }
    .cfg-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cfg-preset-name { font-size: .78rem; font-weight: 500; color: var(--muted); }
    .cfg-preset-name span { color: var(--accent); font-weight: 600; }
    .reset-btn {
      font-size: .69rem; color: var(--muted); background: none;
      border: 1px solid var(--border); border-radius: 20px;
      padding: 3px 10px; cursor: pointer; transition: all .15s; font-weight: 500;
    }
    .reset-btn:hover { color: var(--text); border-color: var(--border-med); }

    .cfg-row {
      display: grid; grid-template-columns: 62px 1fr 1fr;
      align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .cfg-row:last-of-type { margin-bottom: 10px; }
    .cfg-label { font-size: .68rem; font-weight: 600; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; }
    .cfg-field { display: flex; flex-direction: column; gap: 1px; }
    .cfg-val-row { display: flex; align-items: baseline; gap: 3px; }
    .cfg-val-row .lbl { font-size: .59rem; color: var(--muted); }
    .cfg-num { font-size: .72rem; font-weight: 700; color: var(--text); min-width: 28px; text-align: right; }
    .cfg-unit { font-size: .59rem; color: var(--muted); }

    input[type=range] { width: 100%; cursor: pointer; height: 18px; -webkit-appearance: none; appearance: none; background: transparent; }
    input[type=range]::-webkit-slider-runnable-track { height: 3px; border-radius: 2px; background: rgba(0,0,0,.1); }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
      background: var(--accent); border: 2.5px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,.22); margin-top: -10.5px; cursor: pointer;
    }
    input[type=range]::-moz-range-track { height: 3px; border-radius: 2px; background: rgba(0,0,0,.1); }
    input[type=range]::-moz-range-thumb {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--accent); border: 2.5px solid white; box-shadow: 0 1px 4px rgba(0,0,0,.22); cursor: pointer;
    }

    .vegan-row {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 0 2px; border-top: 1px solid var(--border); margin-top: 4px;
    }
    .vegan-row label { font-size: .76rem; cursor: pointer; display: flex; align-items: center; gap: 7px; color: var(--text-2); font-weight: 500; }
    .vegan-row input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
    .vegan-row input[type=checkbox]:disabled { cursor: default; opacity: .45; }
    .vegan-row label:has(input:disabled) { opacity: .55; cursor: default; }
    .filter-soon {
      margin-left: 6px; font-size: .6rem; font-weight: 600; letter-spacing: .04em;
      text-transform: uppercase; color: var(--muted);
      background: rgba(0,0,0,.06); border-radius: 4px; padding: 1px 5px;
    }

    .dist-row {
      display: none; align-items: center; gap: 8px;
      padding: 9px 0 2px; border-top: 1px solid var(--border); margin-top: 4px;
    }
    .dist-row.active { display: flex; }
    .dist-label { font-size: .68rem; font-weight: 600; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
    .dist-val { font-size: .72rem; font-weight: 700; min-width: 72px; color: var(--accent); }
    .dist-row input[type=range] { flex: 1; }

    /* ── Results header ── */
    .results-header {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 10px 0 8px; position: sticky; top: 0; z-index: 50;
      background: var(--bg); margin: 0 -18px; padding-left: 18px; padding-right: 18px;
      border-bottom: 0.5px solid rgba(0,0,0,.09);
    }
    #status-bar { flex: 1; font-size: .73rem; color: var(--muted); }

    /* Confidence pill toggles */
    .conf-filter { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .conf-label { font-size: .7rem; color: var(--muted); margin-right: 2px; }
    .cf-pill { position: relative; line-height: 1; }
    .cf-pill input { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
    .cf-pill span {
      display: inline-block; padding: 4px 10px; border-radius: 20px;
      font-size: .67rem; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface); color: var(--muted);
      transition: all .15s; user-select: none;
    }
    .cf-high input:checked + span { background: #ecfdf5; color: #15803d; border-color: #86efac; }
    .cf-med  input:checked + span { background: #fffbeb; color: #92400e; border-color: #fcd34d; }
    .cf-low  input:checked + span { background: #f8fafc; color: #475569; border-color: #cbd5e1; }

    .unit-tabs { display: flex; background: rgba(0,0,0,.06); border-radius: 10px; padding: 2px; gap: 2px; flex-shrink: 0; }
    .unit-tab {
      font-size: .68rem; font-weight: 500; padding: 4px 10px; border-radius: 8px;
      border: none; background: transparent; color: var(--muted);
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .unit-tab.active {
      background: var(--surface); color: var(--text); font-weight: 600;
      box-shadow: 0 1px 3px rgba(0,0,0,.11), 0 0 0 0.5px rgba(0,0,0,.05);
    }
    .results-header-row2 {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 6px 18px 8px; margin: 0 -18px;
    }
    .sort-label { font-size: .68rem; color: var(--muted); font-weight: 500; flex-shrink: 0; }

    .empty { text-align: center; color: var(--muted); padding: 48px 0; font-size: .88rem; line-height: 1.7; }

    /* ── Cards ── */
    .restaurant-card {
      background: var(--surface);
      border-radius: var(--radius); overflow: hidden;
      margin-bottom: 12px; scroll-margin-top: 10px;
      display: flex; flex-direction: column;
    }
    .restaurant-card.highlighted { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-mid); }

    .card-photo-wrap { position: relative; flex-shrink: 0; overflow: hidden; }
    .card-photo { width: 100%; height: 158px; object-fit: cover; display: block; background: var(--bg); }

    /* slider nav buttons */
    .photo-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 30px; height: 30px; border-radius: 50%;
      background: white; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.22);
      color: #222; font-size: 13px; font-weight: 700;
      opacity: .92; transition: opacity .15s; z-index: 2;
      line-height: 1; padding: 0;
    }
    .photo-nav:hover { opacity: 1; }
    .photo-nav--prev { left: 8px; }
    .photo-nav--next { right: 8px; }
    @media (min-width: 681px) {
      .photo-nav { opacity: 0; }
      .card-photo-wrap:hover .photo-nav { opacity: .92; }
      .card-photo-wrap:hover .photo-nav:hover { opacity: 1; }
    }
    .photo-dots {
      position: absolute; bottom: 7px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px; pointer-events: none;
    }
    .photo-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,.55); transition: background .2s;
    }
    .photo-dot.active { background: white; }

    /* desktop: photo left */
    @media (min-width: 681px) {
      .restaurant-card { flex-direction: row; align-items: stretch; }
      .card-photo-wrap { width: 210px; }
      .card-photo-wrap .card-photo { height: 100%; min-height: 170px; }
    }

    .card-body { padding: 13px 15px; flex: 1; min-width: 0; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
    .card-header-left { flex: 1; min-width: 0; }
    .card-title-row { display: flex; align-items: center; gap: 6px; }
    .card-header-left h2 { font-size: .93rem; font-weight: 600; letter-spacing: -.02em; line-height: 1.25; }
    .card-title-link { cursor: pointer; transition: color .15s; }
    .card-title-link:hover { color: var(--accent); }
    .card-header-left .addr { font-size: .7rem; color: var(--muted); margin-top: 3px; }
    .card-summary { font-size: .7rem; color: var(--muted); margin-top: 5px; line-height: 1.45; font-style: italic; }
    .card-hours { display: flex; align-items: center; gap: 5px; margin-top: 4px; font-size: .7rem; color: var(--muted); }
    .open-tag { display: inline-flex; align-items: center; font-size: .62rem; font-weight: 700; padding: 1px 6px; border-radius: 20px; letter-spacing: .03em; flex-shrink: 0; }
    .open-tag--open  { background: #dcfce7; color: #15803d; }
    .open-tag--closed { background: #fee2e2; color: #b91c1c; }
    .map-btn {
      background: none; border: none; cursor: pointer;
      padding: 4px; border-radius: 7px; flex-shrink: 0;
      color: var(--muted); opacity: .55; transition: opacity .15s, background .15s, color .15s;
      display: flex; align-items: center;
    }
    .map-btn:hover { opacity: 1; background: var(--accent-light); color: var(--accent); }
    .card-meta { font-size: .7rem; color: var(--muted); text-align: right; flex-shrink: 0; line-height: 1.65; }
    .card-meta-links { display: flex; gap: 8px; justify-content: flex-end; align-items: center; margin-top: 5px; }
    .delivery-link { display: inline-flex; align-items: center; color: #d0d0d0; transition: color .15s; line-height: 1; }
    .delivery-link:hover { color: #00C6ED; }
    .delivery-link svg { display: inline-block; }
    .directions-link { display: inline-flex; align-items: center; gap: 3px; font-size: .68rem; font-weight: 500; color: #c0c0c0; text-decoration: none; transition: color .15s; white-space: nowrap; }
    .directions-link:hover { color: #1a73e8; }
    .directions-link svg { flex-shrink: 0; }

    .card-rating { display: inline-flex; align-items: center; gap: 3px; font-size: .75rem; font-weight: 600; color: #92400e; flex-shrink: 0; }
    .card-rating .star { color: #f59e0b; }
    .card-rating .reviews { font-size: .66rem; font-weight: 400; color: var(--muted); }

    /* ── Dish rows ── */
    .dishes-list { display: flex; flex-direction: column; gap: 5px; }
    .dish-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 10px; padding: 8px 10px;
      background: var(--bg); border-radius: var(--radius-xs); font-size: .77rem;
    }
    .dish-left { flex: 1; min-width: 0; }
    .dish-name { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; min-width: 0; }
    .dish-name-text { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1; }
    .dish-desc { color: var(--muted); font-size: .68rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dish-macros { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; align-items: flex-start; }

    @media (max-width: 680px) {
      .dish-row { flex-direction: column; gap: 4px; }
      .dish-name-text { white-space: normal; overflow: visible; text-overflow: unset; }
      .dish-desc { white-space: normal; overflow: visible; text-overflow: unset; }
      .dish-macros { justify-content: flex-start; }
    }

    /* Rounded pill macros */
    .macro { font-size: .62rem; font-weight: 600; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
    .macro-cal   { background: #fff1f2; color: #be123c; }
    .macro-prot  { background: #eff6ff; color: #1d4ed8; }
    .macro-fat   { background: #fffbeb; color: #b45309; }
    .macro-carb  { background: #f0fdf4; color: #166534; }
    .macro-price { background: none; color: #111; font-weight: 500; }
    .unit-note { font-size: .6rem; color: var(--muted); align-self: center; white-space: nowrap; }

    /* Confidence dot */
    .conf-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; display: inline-block; vertical-align: middle; }
    .conf-dot-high        { background: #22c55e; }
    .conf-dot-medium-high { background: #4ade80; }
    .conf-dot-medium      { background: #fbbf24; }
    .conf-dot-low         { background: #d1d5db; }

    .source-tag {
      font-size: .57rem; font-weight: 500; padding: 1px 5px;
      border-radius: 4px; border: 1px solid var(--border);
      color: var(--muted); background: transparent; white-space: nowrap; flex-shrink: 0;
    }

    .more-link {
      font-size: .73rem; color: var(--accent); cursor: pointer;
      padding: 8px 10px; text-align: center; border-radius: var(--radius-xs);
      font-weight: 500; letter-spacing: -.01em; transition: background .15s;
    }
    .more-link:hover { background: var(--accent-light); }

    /* ── Place modal ── */
    #place-modal {
      display: none; position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,.48); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      align-items: center; justify-content: center;
    }
    #place-modal.open { display: flex; }
    .place-modal-inner {
      position: relative; width: min(680px, 96vw); height: min(520px, 86vh);
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.38);
      animation: modal-in .22s cubic-bezier(.34,1.4,.64,1);
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(.92) translateY(16px); }
      to   { opacity: 1; transform: none; }
    }
    #place-iframe { width: 100%; height: 100%; border: none; display: block; }
    .place-modal-close {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      width: 28px; height: 28px; border-radius: 50%;
      border: none; background: rgba(255,255,255,.92); backdrop-filter: blur(4px);
      cursor: pointer; font-size: .8rem; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.18); transition: transform .15s, background .15s;
      color: var(--text);
    }
    .place-modal-close:hover { background: #fff; transform: scale(1.1); }

    /* Info window */
    /* ── Pill map markers ── */
    .pill-marker {
      position: absolute;
      transform: translate(-50%, calc(-100% - 6px));
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px; font-weight: 600;
      white-space: nowrap; cursor: pointer; user-select: none;
      box-shadow: 0 2px 10px rgba(0,0,0,.22);
      transition: background .12s, color .12s, box-shadow .12s;
      z-index: 1;
    }
    .pill-marker--match   { background: white; color: #111; }
    .pill-marker--highlight { background: #111; color: white; z-index: 10; box-shadow: 0 3px 14px rgba(0,0,0,.38); }
    .pill-marker--inactive { display: none; }

    .lf-popup b { font-size: .88rem; }
    .lf-popup small { color: #64748b; font-size: .72rem; }
    .lf-popup .dishes-count { color: var(--accent); font-weight: 700; font-size: .82rem; margin-top: 5px; }
    .lf-popup .scroll-link { display: inline-block; margin-top: 5px; font-size: .75rem; color: #3b82f6; cursor: pointer; }
    .lf-popup .scroll-link:hover { text-decoration: underline; }

    /* ── Dish modal ── */
    #dish-modal {
      display: none; position: fixed; inset: 0; z-index: 3000;
      background: rgba(0,0,0,.52); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      align-items: flex-end; justify-content: center;
    }
    @media (min-height: 600px) { #dish-modal { align-items: center; } }
    #dish-modal.open { display: flex; }
    .dish-modal-inner {
      position: relative; width: min(440px, 100vw);
      max-height: 90vh; overflow-y: auto;
      border-radius: 24px 24px 0 0; background: #fff;
      box-shadow: 0 -8px 60px rgba(0,0,0,.28);
      animation: dish-modal-in .28s cubic-bezier(.34,1.3,.64,1);
    }
    @media (max-width: 680px) {
      .dish-modal-inner { width: calc(100vw - 32px); margin: 0 16px; border-radius: 20px 20px 0 0; }
    }
    @media (min-height: 600px) {
      .dish-modal-inner { border-radius: 24px; }
    }
    @keyframes dish-modal-in {
      from { opacity: 0; transform: translateY(40px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .dish-modal-img {
      width: 100%; height: 200px; object-fit: cover;
      border-radius: 24px 24px 0 0; display: block;
      background: linear-gradient(135deg, #e0e7ff 0%, #f0fdf4 100%);
    }
    .dish-modal-img-placeholder {
      width: 100%; height: 200px;
      border-radius: 24px 24px 0 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .dish-modal-img-placeholder svg { opacity: .35; }
    .dish-modal-body { padding: 20px 22px 28px; }
    .dish-modal-restaurant {
      font-size: .72rem; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px;
    }
    .dish-modal-title {
      font-size: 1.18rem; font-weight: 700; line-height: 1.3;
      letter-spacing: -.02em; color: var(--text); margin-bottom: 14px;
      display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
    }
    .dish-modal-weight {
      font-size: .78rem; font-weight: 500; color: var(--muted);
      letter-spacing: 0; flex-shrink: 0;
    }
    .dish-modal-macros {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px;
    }
    .dish-modal-macros .macro { font-size: .75rem; padding: 4px 10px; }

    /* AI Advice block */
    .advice-block {
      background: linear-gradient(135deg, #f8faff 0%, #f0f9ff 100%);
      border: 1px solid #dbeafe;
      border-radius: 14px; padding: 14px 16px;
    }
    .advice-header {
      display: flex; align-items: center; gap: 7px; margin-bottom: 8px;
    }
    .advice-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: .68rem; font-weight: 600; letter-spacing: .04em;
      color: #3b82f6; text-transform: uppercase;
    }
    .advice-badge svg { flex-shrink: 0; }
    .advice-rating {
      margin-left: auto;
      font-size: .72rem; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; white-space: nowrap;
    }
    .advice-rating-1 { background: #fee2e2; color: #b91c1c; }
    .advice-rating-2 { background: #fef9c3; color: #a16207; }
    .advice-rating-3 { background: #dcfce7; color: #15803d; }
    .advice-rating-4 { background: #dbeafe; color: #1d4ed8; }

    .advice-scale {
      display: flex; gap: 3px; margin-bottom: 10px;
    }
    .advice-scale-seg {
      flex: 1; height: 4px; border-radius: 2px; background: #e5e7eb;
      transition: background .3s;
    }
    .advice-scale-seg.active-1 { background: #ef4444; }
    .advice-scale-seg.active-2 { background: #eab308; }
    .advice-scale-seg.active-3 { background: #22c55e; }
    .advice-scale-seg.active-4 { background: #3b82f6; }
    .advice-labels {
      display: flex; justify-content: space-between;
      font-size: .6rem; color: var(--muted); margin-bottom: 12px;
    }
    .advice-what {
      font-size: .78rem; color: #6b7280; font-style: italic;
      margin-bottom: 10px; line-height: 1.4;
    }
    .advice-text {
      font-size: .8rem; line-height: 1.5; color: #374151;
    }
    .advice-loading {
      display: flex; align-items: center; gap: 8px;
      font-size: .8rem; color: var(--muted); padding: 4px 0;
    }
    .advice-spinner {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid #dbeafe; border-top-color: #3b82f6;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .dish-modal-close {
      position: absolute; top: 14px; right: 14px; z-index: 10;
      width: 30px; height: 30px; border-radius: 50%; border: none;
      background: rgba(255,255,255,.9); backdrop-filter: blur(4px);
      cursor: pointer; font-size: .9rem; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px rgba(0,0,0,.2); transition: transform .15s, background .15s;
      color: var(--text);
    }
    .dish-modal-close:hover { background: #fff; transform: scale(1.1); }

    .dish-row { cursor: pointer; transition: background .15s; }
    .dish-row:hover { background: #f0f9ff; }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="header-brand-mark">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
    </div>
    <span class="header-brand-name">Nutrition Finder</span>
  </div>
  <span id="loc-status">Berlin Mitte</span>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" id="search-input" placeholder="Dish or restaurant…" oninput="onSearch()" autocomplete="off">
  </div>
</header>

<div class="layout">
  <div id="map-panel">
    <div id="map"></div>
    <div id="map-controls">
      <button class="map-ctrl-btn" onclick="map.setZoom(map.getZoom()+1)" title="Zoom in">+</button>
      <button class="map-ctrl-btn" onclick="map.setZoom(map.getZoom()-1)" title="Zoom out">−</button>
      <button class="map-ctrl-btn map-ctrl-locate" onclick="locateMe()" title="My location">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div id="list-panel">
  <div id="sheet-handle">
    <div class="sheet-pill"></div>
    <div id="sheet-peek-label">Loading…</div>
  </div>
  <div id="sheet-scroll">

    <div class="profile-section">
      <div class="profile-row">
        <div class="toggle-group" id="gender-grp">
          <button class="toggle-btn active" data-val="male" onclick="selectGender('male')">Male</button>
          <button class="toggle-btn" data-val="female" onclick="selectGender('female')">Female</button>
        </div>
        <div class="toggle-group" id="goal-grp">
          <button class="toggle-btn" data-val="loss" onclick="selectGoal('loss')">Weight loss</button>
          <button class="toggle-btn active" data-val="maintain" onclick="selectGoal('maintain')">Maintain</button>
          <button class="toggle-btn" data-val="gain" onclick="selectGoal('gain')">Muscle gain</button>
        </div>
        <div class="daily-summary" id="daily-summary"></div>
      </div>

      <div class="meal-tabs-row" id="meal-tabs">
        <button class="meal-tab" data-meal="breakfast" onclick="selectMeal('breakfast')">Breakfast</button>
        <button class="meal-tab active" data-meal="lunch" onclick="selectMeal('lunch')">Lunch</button>
        <button class="meal-tab" data-meal="dinner" onclick="selectMeal('dinner')">Dinner</button>
      </div>

      <div class="meal-cfg-row" id="meal-cfgs">
        <button class="meal-cfg-btn" data-cfg="high_protein" onclick="selectMealConfig('high_protein')">High protein</button>
        <button class="meal-cfg-btn" data-cfg="high_carb" onclick="selectMealConfig('high_carb')">High carb</button>
        <button class="meal-cfg-btn" data-cfg="balanced" onclick="selectMealConfig('balanced')">Balanced</button>
      </div>
    </div>

    <div id="configurator">
      <div class="cfg-header">
        <div class="cfg-preset-name" id="cfg-preset-label"><span>Choose a configuration above</span></div>
        <button class="reset-btn" onclick="resetConfig()">Reset</button>
      </div>

      <div class="cfg-row">
        <div class="cfg-label">Kcal</div>
        <div class="cfg-field">
          <div class="cfg-val-row"><span class="lbl">from</span><span class="cfg-num" id="v-cal-min">0</span></div>
          <input type="range" id="s-cal-min" min="0" max="1475" step="25" value="0" oninput="onSlider()">
        </div>
        <div class="cfg-field">
          <div class="cfg-val-row"><span class="lbl">to</span><span class="cfg-num" id="v-cal-max">1500</span><span class="cfg-unit">kcal</span></div>
          <input type="range" id="s-cal-max" min="25" max="1500" step="25" value="1500" oninput="onSlider()">
        </div>
      </div>

      <div class="cfg-row">
        <div class="cfg-label">Protein</div>
        <div class="cfg-field">
          <div class="cfg-val-row"><span class="lbl">from</span><span class="cfg-num" id="v-prot-min">0</span></div>
          <input type="range" id="s-prot-min" min="0" max="199" step="1" value="0" oninput="onSlider()">
        </div>
        <div class="cfg-field">
          <div class="cfg-val-row"><span class="lbl">to</span><span class="cfg-num" id="v-prot-max">200</span><span class="cfg-unit">g</span></div>
          <input type="range" id="s-prot-max" min="1" max="200" step="1" value="200" oninput="onSlider()">
        </div>
      </div>

      <div class="cfg-row">
        <div class="cfg-label">Fat</div>
        <div class="cfg-field">
          <div class="cfg-val-row"><span class="lbl">from</span><span class="cfg-num" id="v-fat-min">0</span></div>
          <input type="range" id="s-fat-min" min="0" max="99" step="1" value="0" oninput="onSlider()">
        </div>
        <div class="cfg-field">
          <div class="cfg-val-row"><span class="lbl">to</span><span class="cfg-num" id="v-fat-max">100</span><span class="cfg-unit">g</span></div>
          <input type="range" id="s-fat-max" min="1" max="100" step="1" value="100" oninput="onSlider()">
        </div>
      </div>

      <div class="cfg-row">
        <div class="cfg-label">Carbs</div>
        <div class="cfg-field">
          <div class="cfg-val-row"><span class="lbl">from</span><span class="cfg-num" id="v-carb-min">0</span></div>
          <input type="range" id="s-carb-min" min="0" max="195" step="5" value="0" oninput="onSlider()">
        </div>

function formatCuisine(raw) {
  if (!raw) return '';
  const key = raw.split(';')[0].trim().toLowerCase().replace(/[ -]/g, '_');
  if (CUISINE_MAP[key]) return CUISINE_MAP[key];
  return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function isVeganDish(dish, restaurant) {
  const cuisine = (restaurant.cuisine || '').toLowerCase();
  if (['vegan','vegetarian'].some(k => cuisine.includes(k))) return true;
  const text = ((dish.name || '') + ' ' + (dish.description || '')).toLowerCase();
  return !MEAT_KEYWORDS.some(k => text.includes(k));
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1)*Math.PI/180, Δλ = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function applyFilter(d, r, cfg) {
  if (cfg.vegan && !isVeganDish(d, r)) return false;
  if (cfg.glutenFree && d.is_gluten_free !== true) return false;
  if (cfg.diabetesFriendly && d.is_diabetic_friendly !== true) return false;
  if (d.calories == null) return false;
  const conf = (d.confidence || 'low').toLowerCase();
  const isHigh  = conf === 'high';
  const isMedHi = conf === 'medium-high';
  const isMed   = conf === 'medium';
  const isLow   = conf === 'low';
  if (isHigh  && !cfg.confHigh) return false;
  if (isMedHi && !cfg.confHigh) return false;
  if (isMed   && !cfg.confMed)  return false;
  if (isLow   && !cfg.confLow)  return false;
  const cal = d.calories, prot = d.protein ?? 0, fat = d.fat ?? 0, carb = d.carbs ?? 0;
  return cal  >= cfg.calMin  && cal  <= cfg.calMax
      && prot >= cfg.protMin && prot <= cfg.protMax
      && fat  >= cfg.fatMin  && fat  <= cfg.fatMax
      && carb >= cfg.carbMin && carb <= cfg.carbMax;
}

// ---- Pill markers ----
function markerText(idx) {
  const mi = currentMatchMap[idx];
  if (!mi) return '';
  return mi.dishes.length === 1 ? '1 dish' : `${mi.dishes.length} dishes`;
}

// ---- Map ----
function initMap() {
  // Defined here so google.maps is already available
  window.PillMarker = class extends google.maps.OverlayView {
    constructor(position, text, state, onClick) {
      super();
      this.position = position;
      this._onClick = onClick;
      this.el = document.createElement('div');
      this.setState(text, state);
      this.el.addEventListener('click', e => { e.stopPropagation(); this._onClick && this._onClick(); });
    }
    setState(text, state) {
      this.el.className = `pill-marker pill-marker--${state}`;
      this.el.textContent = text || '';
    }
    onAdd() { this.getPanes().overlayMouseTarget.appendChild(this.el); }
    draw() {
      const proj = this.getProjection();
      if (!proj) return;
      const pt = proj.fromLatLngToDivPixel(new google.maps.LatLng(this.position.lat, this.position.lng));
      if (!pt) return;
      this.el.style.left = `${pt.x}px`;
      this.el.style.top = `${pt.y}px`;
    }
    onRemove() { if (this.el.parentNode) this.el.parentNode.removeChild(this.el); }
  };

  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: MAP_CENTER[0], lng: MAP_CENTER[1] },
    zoom: 15, mapTypeControl: false, streetViewControl: false,
    fullscreenControl: false, zoomControl: false,
  });
  infoWindow = new google.maps.InfoWindow();
  restaurants.forEach((r, idx) => {
    if (!(r.wolt_menu?.length || r.site_menu?.length) || !r.lat || !r.lon) return;
    const marker = new PillMarker(
      { lat: r.lat, lng: r.lon }, '', 'inactive',
      () => { if (isMobile()) sheetExpand(); scrollToCard(idx); showInfoWindow(marker, r, idx); }
    );
    marker.setMap(map);
    markers[idx] = marker;
  });
}

function makePopupContent(r, idx, matchInfo) {
  const cuisine = (r.cuisine||'').split(';')[0].replace(/_/g,' ');
  const rating = r.rating ? `<br><small>★ ${r.rating} (${(r.reviews_count||0).toLocaleString('ru')})</small>` : '';
  let html = `<div class="lf-popup"><b>${esc(r.name)}</b>${rating}<br><small>${esc(r.address||'')}</small>`;
  if (cuisine) html += `<br><small style="color:#1d4ed8">${esc(cuisine)}</small>`;
  if (matchInfo) html +=
    `<div class="dishes-count">${matchInfo.dishes.length} matching dishes</div>
     <span class="scroll-link" onclick="scrollToCard(${idx})">Показать в списке</span>`;
  return html + '</div>';
}

function showInfoWindow(marker, r, idx) {
  infoWindow.setContent(makePopupContent(r, idx, currentMatchMap[idx]));
  infoWindow.setPosition(marker.position);
  infoWindow.open(map);
}

function updateMarkers(matched) {
  currentMatchMap = {};
  matched.forEach(m => { currentMatchMap[m.idx] = m; });
  Object.entries(markers).forEach(([idxStr, marker]) => {
    const idx = Number(idxStr);
    const mi = currentMatchMap[idx];
    marker.setState(markerText(idx), mi ? 'match' : 'inactive');
  });
}

function highlightMarker(idx) {
  const marker = markers[idx];
  if (!marker) return;
  marker.setState(markerText(idx), 'highlight');
}
function unhighlightMarker(idx) {
  const marker = markers[idx];
  if (!marker) return;
  marker.setState(markerText(idx), currentMatchMap[idx] ? 'match' : 'inactive');
}

// ---- Results ----
function renderResults() {
  const cfg = readConfig();
  const withMenu = restaurants.filter(r => r.wolt_menu?.length || r.site_menu?.length);
  const q = searchQuery.trim().toLowerCase();

  const matched = withMenu.map(r => {
    const idx = restaurants.indexOf(r);
    const dist = (userLat != null && r.lat && r.lon) ? haversine(userLat, userLon, r.lat, r.lon) : null;
    if (cfg.distMax < 5000 && dist != null && dist > cfg.distMax) return null;
    const allDishes = [...(r.wolt_menu || []), ...(r.site_menu || [])];
    const rNameMatch = !q || r.name.toLowerCase().includes(q);
    const dishes = allDishes.filter(d => {
      if (!applyFilter(d, r, cfg)) return false;
      if (!q) return true;
      if (rNameMatch) return true;
      return d.name.toLowerCase().includes(q);
    });
    if (!dishes.length) return null;
    return { r, dishes, dist, idx };
  }).filter(Boolean).sort((a, b) => {
    if (sortMode === 'alpha') return a.r.name.localeCompare(b.r.name, 'de');
    if (sortMode === 'dist') {
      if (a.dist != null && b.dist != null) return a.dist - b.dist;
      if (a.dist != null) return -1;
      if (b.dist != null) return 1;
      return a.r.name.localeCompare(b.r.name, 'de');
    }
    // 'match' — по количеству подходящих блюд, затем по расстоянию
    if (b.dishes.length !== a.dishes.length) return b.dishes.length - a.dishes.length;
    if (a.dist != null && b.dist != null) return a.dist - b.dist;
    return 0;
  });

  updateMarkers(matched);

  document.getElementById('status-bar').innerHTML = matched.length
    ? `<b>${matched.length}</b> restaurants · ${cfg.calMin}–${cfg.calMax} kcal · P ${cfg.protMin}–${cfg.protMax}g · F ${cfg.fatMin}–${cfg.fatMax}g · C ${cfg.carbMin}–${cfg.carbMax}g${cfg.vegan ? ' · vegan' : ''}${cfg.glutenFree ? ' · gluten-free' : ''}${cfg.diabetesFriendly ? ' · diabetes-friendly' : ''}`
    : `<span style="color:#dc2626">No matching dishes</span>`;
  updatePeekLabel(matched.length);

  document.getElementById('results').innerHTML = matched.length
    ? matched.map(m => renderCard(m)).join('') : '';
}

const PIN_SVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

function getOpenStatus(oh) {
  if (!oh || !oh.periods || !oh.periods.length) return null;
  const berlinStr = new Date().toLocaleString('en-US', { timeZone: 'Europe/Berlin' });
  const berlin = new Date(berlinStr);
  const jsDay = berlin.getDay(); // 0=Sun
  const hhmm = berlin.getHours() * 100 + berlin.getMinutes();
  let isOpen = false;
  for (const p of oh.periods) {
    const od = p.open.day, ot = parseInt(p.open.time, 10);
    const cd = p.close ? p.close.day : od, ct = p.close ? parseInt(p.close.time, 10) : 2359;
    if (od === cd) {
      if (jsDay === od && hhmm >= ot && hhmm < ct) { isOpen = true; break; }
    } else {
      if (jsDay === od && hhmm >= ot) { isOpen = true; break; }
      if (jsDay === cd && hhmm < ct)  { isOpen = true; break; }
    }
  }
  const wdIdx = (jsDay + 6) % 7; // Mon=0 in weekday_text
  const todayLine = oh.weekday_text ? oh.weekday_text[wdIdx] : null;
  const hoursText = todayLine ? todayLine.replace(/^[^:]+:\s*/, '') : null;
  return { isOpen, hoursText };
}

function renderCard({ r, dishes, dist, idx }) {
  const MAX = 5, expanded = expandedCards[idx], shown = expanded ? dishes : dishes.slice(0, MAX);
  const cuisine = formatCuisine(r.cuisine);
  const distText = dist != null ? (dist < 1000 ? dist+'м' : (dist/1000).toFixed(1)+' км') : '';
  const metaParts = [cuisine, distText, dishes.length + ' dishes'].filter(Boolean);

  const woltLink = r.wolt_slug
    ? `<a href="https://wolt.com/de/deu/berlin/restaurant/${r.wolt_slug}" target="_blank" rel="noopener" class="delivery-link" title="Order on Wolt" onclick="event.stopPropagation()"><svg width="38" height="15" aria-label="Wolt"><use href="#ic-wolt"/></svg></a>`
    : '';

  const mapsHref = (r.lat && r.lon)
    ? `https://www.google.com/maps/dir/?api=1&destination=${r.lat},${r.lon}`
    : '';
  const directionsLink = mapsHref
    ? `<a href="${mapsHref}" target="_blank" rel="noopener" class="directions-link" title="Get directions" onclick="event.stopPropagation()"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M11.293 1.293a1 1 0 011.414 0l10 10a1 1 0 010 1.414l-10 10a1 1 0 01-1.414 0l-10-10a1 1 0 010-1.414l10-10z"/><path d="M8.5 16v-5.5H14" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M11.5 7.5L14 10l-2.5 2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></a>`
    : '';

  const orderLink = (directionsLink || woltLink)
    ? `<div class="card-meta-links">${woltLink}${directionsLink}</div>`
    : '';

  const photos = (r.photos && r.photos.length) ? r.photos : (r.photo_url ? [r.photo_url] : []);
  const photoWrap = photos.length ? (() => {
    const imgs = photos.map((url, i) =>
      `<img class="card-photo" src="${esc(url)}" alt="${esc(r.name)}" loading="lazy" style="display:${i===0?'block':'none'}" onerror="this.style.display='none'">`
    ).join('');
    const navBtns = photos.length > 1 ? `
      <button class="photo-nav photo-nav--prev" onclick="event.stopPropagation();photoNav(${idx},-1,${photos.length})" aria-label="Previous photo">&#8249;</button>
      <button class="photo-nav photo-nav--next" onclick="event.stopPropagation();photoNav(${idx},1,${photos.length})" aria-label="Next photo">&#8250;</button>
      <div class="photo-dots">${photos.map((_,i)=>`<span class="photo-dot${i===0?' active':''}"></span>`).join('')}</div>` : '';
    return `<div class="card-photo-wrap" id="photo-wrap-${idx}">${imgs}${navBtns}</div>`;
  })() : '';

  const rating = r.rating != null
    ? `<span class="card-rating"><span class="star">★</span>${r.rating.toFixed(1)}<span class="reviews">(${(r.reviews_count||0).toLocaleString('ru')})</span></span>`
    : '';

  const openStatus = getOpenStatus(r.opening_hours);
  const hoursHtml = openStatus
    ? `<div class="card-hours">
         <span class="open-tag ${openStatus.isOpen ? 'open-tag--open' : 'open-tag--closed'}">${openStatus.isOpen ? 'Open now' : 'Closed'}</span>
         ${openStatus.hoursText ? `<span>${esc(openStatus.hoursText)}</span>` : ''}
       </div>`
    : '';

  return `
    <div class="restaurant-card" onmouseenter="highlightMarker(${idx})" onmouseleave="unhighlightMarker(${idx})">
      ${photoWrap}
      <div class="card-body">
        <div class="card-header">
          <div class="card-header-left">
            <div class="card-title-row">
              <h2 class="card-title-link" onclick="${r.google_place_id ? `openPlaceModal(${idx})` : `panToMarker(${idx})`}">${esc(r.name)}</h2>
              ${rating}
              <button class="map-btn" onclick="panToMarker(${idx})" title="Показать на карте">${PIN_SVG}</button>
            </div>
            <div class="addr">${esc(r.address||'')}</div>
            ${hoursHtml}
            ${r.editorial_summary ? `<div class="card-summary">${esc(r.editorial_summary)}</div>` : ''}
          </div>
          <div class="card-meta">${metaParts.join(' · ')}${orderLink}</div>
        </div>
        <div class="dishes-list" id="card-${idx}">${shown.map(renderDish).join('')}</div>
        ${dishes.length > MAX && !expanded
          ? `<div class="more-link" onclick="expandCard(${idx})">${dishes.length-MAX} more dishes</div>` : ''}
      </div>
    </div>`;
}

function fmtMacro(val, unit, conf) {
  if (val == null) return '';
  if (conf === 'high') return `${Math.round(val)}${unit}`;
  const spread = conf === 'medium-high' ? 0.10 : conf === 'medium' ? 0.15 : 0.30;
  const lo = Math.round(val * (1 - spread));
  const hi = Math.round(val * (1 + spread));
  return `~${lo}–${hi}${unit}`;
}

function setSort(mode) {
  sortMode = mode;
  document.querySelectorAll('#sort-match, #sort-dist, #sort-alpha').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + mode).classList.add('active');
  onSlider();
}

function setUnit(is100g) {
  per100gMode = is100g;
  document.getElementById('tab-serving').classList.toggle('active', !is100g);
  document.getElementById('tab-100g').classList.toggle('active', is100g);
  renderResults();
}

function onSearch() {
  searchQuery = document.getElementById('search-input').value;

function renderDish(d) {
  const conf = d.confidence || 'low';
  const price = d.price != null && d.price > 0 ? `<span class="macro macro-price">€${d.price.toFixed(2)}</span>` : '';

  const weight = d.weight_grams_estimate || d.serving_g || null;
  const has100g = weight != null && d.calories != null;
  let cal_val, prot_val, fat_val, carb_val, unit_label;
  if (per100gMode && has100g) {
    const k = 100 / weight;
    cal_val  = Math.round(d.calories * k);
    prot_val = d.protein != null ? Math.round(d.protein * k * 10) / 10 : null;
    fat_val  = d.fat     != null ? Math.round(d.fat     * k * 10) / 10 : null;
    carb_val = d.carbs   != null ? Math.round(d.carbs   * k * 10) / 10 : null;
    unit_label = `<span class="unit-note">/ 100г</span>`;
  } else {
    cal_val  = d.calories;
    prot_val = d.protein;
    fat_val  = d.fat;
    carb_val = d.carbs;
    if (per100gMode && !has100g) {
      unit_label = `<span class="unit-note" style="color:#f59e0b">~порция</span>`;
    } else {
      unit_label = weight ? `<span class="unit-note">~${weight}г</span>` : '';
    }
  }

  const cal  = cal_val  != null ? `<span class="macro macro-cal">${fmtMacro(cal_val,  ' kcal', conf)}</span>` : '';
  const prot = prot_val != null ? `<span class="macro macro-prot">P ${fmtMacro(prot_val, 'g', conf)}</span>` : '';
  const fat  = fat_val  != null ? `<span class="macro macro-fat">F ${fmtMacro(fat_val,  'g', conf)}</span>` : '';
  const carb = carb_val != null ? `<span class="macro macro-carb">C ${fmtMacro(carb_val, 'g', conf)}</span>` : '';

  const srcLabel = SOURCE_LABELS[d.source];
  const srcTag = srcLabel ? `<span class="source-tag">${esc(srcLabel)}</span>` : '';

  const dishData = encodeURIComponent(JSON.stringify({
    name: d.name, description: d.description || '',
    calories: d.calories, protein: d.protein, fat: d.fat, carbs: d.carbs,
    weight: d.weight_grams_estimate || d.serving_g || null,
    price: d.price || null
  }));

  return `
    <div class="dish-row" data-dish='${dishData}' onclick="openDishModal(this)">
      <div class="dish-left">
        <div class="dish-name">
          <span class="dish-name-text">${esc(d.name)}</span>
          <span class="conf-dot conf-dot-${conf}" title="${conf}"></span>
          ${srcTag}
        </div>
        ${d.description ? `<div class="dish-desc">${esc(d.description)}</div>` : ''}
      </div>
      <div class="dish-macros">${cal}${prot}${fat}${carb}${unit_label}${price}</div>
    </div>`;
}

function expandCard(idx) {
  expandedCards[idx] = true;
  renderResults();
  requestAnimationFrame(() => {
    document.getElementById('card-'+idx)?.closest('.restaurant-card')

function scrollToCard(idx) {
  const card = document.getElementById('card-'+idx)?.closest('.restaurant-card');

  document.querySelectorAll('.restaurant-card').forEach(c => c.classList.remove('highlighted'));
  card.classList.add('highlighted');

}

function panToMarker(idx) {
  const marker = markers[idx];
  if (!marker) return;
  if (isMobile()) sheetPeek();
  smoothZoom(map, 17, () => {
    map.panTo(new google.maps.LatLng(marker.position.lat, marker.position.lng));
    marker.setState(markerText(idx), 'highlight');
    setTimeout(() => {
      marker.setState(markerText(idx), currentMatchMap[idx] ? 'match' : 'inactive');
    }, 2000);
    showInfoWindow(marker, restaurants[idx], idx);
  });
}

function smoothZoom(gmap, targetZoom, callback) {
  const current = gmap.getZoom();
  if (current === targetZoom) { callback && callback(); return; }
  const step = current < targetZoom ? 1 : -1;
  google.maps.event.addListenerOnce(gmap, 'zoom_changed', () => {
    if (gmap.getZoom() !== targetZoom) smoothZoom(gmap, targetZoom, callback);
    else callback && callback();
  });
  setTimeout(() => gmap.setZoom(current + step), 80);
}

let _dishModalRestaurant = null;

function openDishModal(rowEl) {
  const d = JSON.parse(decodeURIComponent(rowEl.dataset.dish));

  // Find restaurant context from nearest card
  const card = rowEl?.closest('.restaurant-card');
  const rName = card?.querySelector('.card-name')?.textContent?.trim() || '';
  const rCuisine = card?.querySelector('.card-meta')?.textContent?.trim() || '';
  const rPhoto = card?.querySelector('.card-photo')?.src || null;

  // Image — show restaurant photo immediately, then try to replace with dish photo
  const imgEl = document.getElementById('dish-modal-img');
  const imgWrap = document.getElementById('dish-modal-img-wrap');
  if (rPhoto) {
    imgEl.src = rPhoto;
    imgEl.style.display = 'block';
    imgWrap.style.display = 'none';
  } else {
    imgEl.style.display = 'none';
    imgWrap.style.display = 'flex';
  }
  // Async: fetch dish-specific photo and replace if found
  fetch(`/api/dish-photo?name=${encodeURIComponent(d.name)}`)
    .then(r => r.json())
    .then(data => {
      if (data.url) {
        imgEl.src = data.url;
        imgEl.style.display = 'block';
        imgWrap.style.display = 'none';
      }
    })
    .catch(() => {});

  document.getElementById('dish-modal-restaurant').textContent = rName;
  const w = d.weight || null;
  document.getElementById('dish-modal-title').innerHTML =
    esc(d.name) + (w ? `<span class="dish-modal-weight">~${w} g</span>` : '');

  // Macros
  const macrosEl = document.getElementById('dish-modal-macros');
  const parts = [];
  if (d.calories != null) parts.push(`<span class="macro macro-cal">${d.calories} kcal</span>`);
  if (d.protein  != null) parts.push(`<span class="macro macro-prot">P ${d.protein}g</span>`);
  if (d.fat      != null) parts.push(`<span class="macro macro-fat">F ${d.fat}g</span>`);
  if (d.carbs    != null) parts.push(`<span class="macro macro-carb">C ${d.carbs}g</span>`);
  if (d.price    != null) parts.push(`<span class="macro macro-price">€${d.price.toFixed(2)}</span>`);
  macrosEl.innerHTML = parts.join('');

  // Reset advice
  document.getElementById('dish-advice-block').innerHTML = `
    <div class="advice-loading">
      <div class="advice-spinner"></div>
      Analyzing dish…
    </div>`;

  document.getElementById('dish-modal').classList.add('open');

  // Fetch advice
  fetch('/api/advice', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name: d.name, restaurant: rName, cuisine: rCuisine,
      calories: d.calories, protein: d.protein, fat: d.fat, carbs: d.carbs,
      weight: w
    })
  })
  .then(r => r.json())
  .then(data => renderAdvice(data))
  .catch(() => renderAdvice(null));
}

// ── Bottom Sheet (mobile) ──
const SHEET_PEEK_H = 110;
let sheetDragging = false;
let sheetTouchStartY = 0;
let sheetTouchStartTY = 0;

function isMobile() { return window.innerWidth <= 680; }

function sheetGetTY() {
  const m = new DOMMatrix(window.getComputedStyle(document.getElementById('list-panel')).transform);
  return m.m42;
}

function sheetPeek() {
  if (!isMobile()) return;
  const panel = document.getElementById('list-panel');
  panel.style.transform = '';  // clear drag inline style so CSS class takes over
  panel.classList.remove('sheet-no-transition', 'sheet-expanded');
  document.getElementById('map-float-btn').classList.remove('visible');
  document.getElementById('sheet-scroll').style.overflowY = 'hidden';
}

function sheetExpand() {
  if (!isMobile()) return;
  const panel = document.getElementById('list-panel');
  panel.style.transform = '';  // clear drag inline style so CSS class takes over
  panel.classList.remove('sheet-no-transition');
  panel.classList.add('sheet-expanded');
  document.getElementById('map-float-btn').classList.add('visible');
  document.getElementById('sheet-scroll').style.overflowY = 'auto';
}

function updatePeekLabel(count) {
  const el = document.getElementById('sheet-peek-label');
  if (el) el.textContent = count ? `${count} restaurant${count === 1 ? '' : 's'}` : 'No matches';
}

function initBottomSheet() {
  const handle = document.getElementById('sheet-handle');
  const panel  = document.getElementById('list-panel');
  const scroll = document.getElementById('sheet-scroll');
  if (!handle || !panel) return;

  // Tap handle when peeked → expand
  handle.addEventListener('click', () => {
    if (!isMobile()) return;
    if (!panel.classList.contains('sheet-expanded')) sheetExpand();
  });

  // Drag handle
  handle.addEventListener('touchstart', e => {
    if (!isMobile()) return;
    sheetDragging = true;
    sheetTouchStartY  = e.touches[0].clientY;
    sheetTouchStartTY = sheetGetTY();
    panel.classList.add('sheet-no-transition');
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!sheetDragging || !isMobile()) return;
    const dy   = e.touches[0].clientY - sheetTouchStartY;
    const h    = panel.offsetHeight;
    const newY = Math.max(0, Math.min(h - SHEET_PEEK_H, sheetTouchStartTY + dy));
    panel.style.transform = `translateY(${newY}px)`;
  }, { passive: true });

  document.addEventListener('touchend', () => {
    if (!sheetDragging || !isMobile()) return;
    sheetDragging = false;
    const currentY = sheetGetTY();
    const h = panel.offsetHeight;
    if (currentY > (h - SHEET_PEEK_H) / 2) sheetPeek();
    else sheetExpand();
  });

  // Tapping the map while sheet is expanded → peek
  document.getElementById('map')?.addEventListener('click', () => {
    if (isMobile() && panel.classList.contains('sheet-expanded')) sheetPeek();
  });
}

document.addEventListener('DOMContentLoaded', initBottomSheet);
